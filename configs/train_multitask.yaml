seed: 42
run_dir: runs
device: auto
data:
  dataset_path: data/datasets/small_net_snapshots.npz
  split:
    train: 0.7
    val: 0.15
    test: 0.15
    shuffle: true
  batch_size: 8
  num_workers: 0
model:
  hidden_dim: 64
  num_layers: 2
  dropout: 0.1
optim:
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
lambda_anom: 1.0
recon_loss_on_all: true
