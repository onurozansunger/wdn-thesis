# Data generation with adversarial attacks enabled
# Usage: python -m wdn.generate --config configs/generate_attacks.yaml

network_inp: "data/Net1.inp"

# Simulation
duration_hours: 24
hydraulic_timestep_minutes: 60
num_scenarios: 50
demand_variation: 0.2

# Corruption with attacks
corruption:
  missing_rate_pressure: 0.3
  missing_rate_flow: 0.3
  noise_sigma_pressure: 0.5
  noise_sigma_flow: 0.2

  # Attack settings
  attack_enabled: true
  attack_fraction: 0.15          # 15% of observed sensors attacked
  attack_type: "mixed"           # randomly pick from all attack types
  attack_bias: 3.0               # bias magnitude / max drift
  attack_scale: 1.5              # scale factor for random falsification

# Output
output_dir: "data/generated_attacks"

seed: 42
